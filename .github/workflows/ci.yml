name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref; saves minutes on force-pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: go test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Print tool versions
        run: go version

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...

  oracle:
    name: cpython oracle diff
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Print tool versions
        run: |
          go version
          python3.14 --version

      - name: tests/run.sh
        run: ./tests/run.sh

  stdlib-compile:
    name: cpython 3.14 stdlib compile (informational)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Print tool versions
        run: |
          go version
          python3.14 --version

      - name: build gocopy
        run: go build -o bin/gocopy ./cmd/gocopy

      # Print pass/fail counts of byte-identical compiles over the local
      # CPython 3.14 stdlib. Not a hard gate in v0.0.x: most files still
      # use language features the compiler does not support yet.
      - name: gocopy compile stdlib (informational)
        run: |
          PYDIR=$(python3.14 -c "import sysconfig; print(sysconfig.get_paths()['stdlib'])")
          ./scripts/stdlib-compile.sh "$PYDIR" || true
        continue-on-error: true

  windows-build:
    name: windows go build
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...
